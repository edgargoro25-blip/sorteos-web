<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Online Gratis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎉 Sorteo Rápido</h1>
        <p>Pega tu lista de participantes (uno por línea):</p>
        
        <textarea id="participantes" placeholder="Juan&#10;María&#10;Carlos&#10;Ana"></textarea>
        
        <button id="btnSortear">¡Elegir Ganador!</button>

        <div id="resultado" class="hidden">
            <h2>🏆 Ganador:</h2>
            <p id="ganadorTexto"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
