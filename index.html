<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteos Creador</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🎉 Sorteos Creador</h1>
            <p>Elige al ganador de tus sorteos de forma fácil</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="manual"><i class="fa-solid fa-list"></i> Manual</button>
            <button class="tab-btn" data-tab="youtube"><i class="fa-brands fa-youtube"></i> YouTube</button>
            <button class="tab-btn" data-tab="tiktok"><i class="fa-brands fa-tiktok"></i> TikTok</button>
        </div>

        <!-- Pestaña Manual -->
        <div class="tab-content active" id="manual">
            <textarea id="listaManual" placeholder="Pega los nombres aquí (uno por línea)...&#10;Ejemplo:&#10;Juan Pérez&#10;María Gómez"></textarea>
        </div>

        <!-- Pestaña YouTube -->
        <div class="tab-content" id="youtube">
            <div class="input-group">
                <input type="text" id="ytUrl" placeholder="Link del video (Ej: https://youtube.com/watch?v=...)">
                <button id="btnCargarYT" class="btn-secondary">Cargar Comentarios</button>
            </div>
            <p id="ytStatus" class="status-text"></p>
        </div>

        <!-- Pestaña TikTok -->
        <div class="tab-content" id="tiktok">
            <div class="input-group">
                <input type="text" id="tkUrl" placeholder="Link del video de TikTok...">
                <button id="btnCargarTK" class="btn-secondary" disabled>No disponible</button>
            </div>
            <p class="status-text warning"><i class="fa-solid fa-triangle-exclamation"></i> TikTok bloquea las webs directas. Usa la opción manual exportando los comentarios.</p>
        </div>

        <!-- Área de Acción -->
        <div class="action-area">
            <p id="totalParticipantes">Participantes cargados: <strong>0</strong></p>
            <button id="btnSortear" class="btn-primary" disabled><i class="fa-solid fa-trophy"></i> ¡Sortear Ganador!</button>
        </div>

        <!-- Pantalla de Resultado -->
        <div id="pantallaResultado" class="hidden">
            <div class="winner-card">
                <h3>🏆 ¡TENEMOS GANADOR! 🏆</h3>
                <h2 id="nombreGanador">---</h2>
                <p id="comentarioGanador"></p>
                <button id="btnCerrarResultado" class="btn-secondary">Hacer otro sorteo</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
